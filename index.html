<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Libri UDS — Ricerca Libri</title>
		<link rel="stylesheet" href="theme.css" />
	</head>
	<body>
		<main class="container">
			<header>
			<div class="page-title">
				<img src="logo.png" alt="Logo UDS" class="logo" />
				<div>
					<h1>Lista dei Libri Disponibili</h1>
					<p class="lead">Cerca nel database dei libri per titolo, autore o codice.</p>
				</div>
			</div>
			</header>

            <a href="come-funziona.html">Come funziona?</a>

			<section class="controls">
				<input id="q" type="search" placeholder="Cerca per titolo, autore, codice o descrizione" autofocus />
				<select id="tag-filter">
					<option value="">Indirizzo</option>
				</select>
				<div id="count" class="count"></div>
			</section>

			<section id="results" class="results">
				<!-- results go here -->
			</section>
		</main>

		<!--Finto dataset -->
		<script id="embedded-books" type="application/json">
		[
			{
				"id": 1,
				"title": "Error",

				"tags": ["algorithms", "textbook", "computer-science"],
				"description": "Error"
			},
		]
		</script>

		<script src="scripts.js" defer></script>
	</body>
</html>
